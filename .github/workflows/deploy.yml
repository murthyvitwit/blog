name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build site
        run: go run . build

      - name: Publish only built HTML to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          enable_jekyll: false
          cname: murthy.xyz

      - name: Point GitHub Pages at gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          body='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          code=$(curl -sS -o /tmp/pages-out.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d "${body}")
          echo "PUT /pages -> HTTP ${code}"
          cat /tmp/pages-out.json
          echo
          if [ "${code}" = "404" ]; then
            code=$(curl -sS -o /tmp/pages-out.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d "${body}")
            echo "POST /pages -> HTTP ${code}"
            cat /tmp/pages-out.json
            echo
          fi
          case "${code}" in
            200|201|204) echo "Pages source set to gh-pages /" ;;
            *) echo "Warning: could not update Pages source (HTTP ${code}). Set Settings → Pages → Deploy from a branch → gh-pages → /" ;;
          esac
